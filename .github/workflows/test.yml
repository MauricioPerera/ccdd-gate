name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install optional tree-sitter grammars (backend multi-lenguaje)
        run: pip install tree_sitter tree_sitter_typescript tree_sitter_rust tree_sitter_go tree_sitter_java tree_sitter_c_sharp tree_sitter_php

      - name: Install optional ruff (linter_gate)
        run: pip install ruff==0.15.20

      - name: linter gate sobre el propio codigo (dogfooding)
        run: python runners/linter_gate.py linters.yaml .

      - name: "KDD: validar contratos de conocimiento"
        run: python scripts/validate_contracts.py knowledge/contracts

      - name: Frozen tests — gate + L2 governance + tc_lint rules (deterministic, no LLM)
        run: python -m unittest tests.test_gates tests.test_l2_governance tests.test_tc_lint_rules -v

      - name: Full test suite (incl. multi-lenguaje, conformancia TS, integración GitHub)
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: ccdd.py lint contracts (signed)
        run: |
          for c in complexity-agent pre-complexity-agent task-author-agent; do
            python ccdd.py lint "contracts/$c"
          done

      - name: task_gate over example contracts
        run: |
          python runners/task_gate.py examples/sandbox/task.md
          for t in clamp popcount hamming chunk; do
            python runners/task_gate.py "examples/batch/$t/task.md"
          done

      - name: MCP server smoke (protocol + 4 tools)
        run: python runners/mcp_smoke.py

      - name: Deterministic gate benchmark
        run: python benchmarks/bench_gate.py
