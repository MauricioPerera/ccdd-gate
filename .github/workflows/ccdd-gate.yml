name: ccdd-gate

# Gate determinista en PR: ningún PR que toque task-contracts (o su código objetivo) entra sin
# pasar tc_lint + task_gate (complejidad ≤ budget + tests congelados + firma). Sin LLM en CI.
# Copiable a cualquier repo consumidor: ver README ("Integración GitHub").

on:
  # Corre en TODOS los PRs (sin filtro de paths) para poder exigirlo como required check en
  # branch protection: un required check con filtro de paths queda "pending" en PRs que no tocan
  # esos paths y bloquea el merge. El driver es barato: si el PR no afecta contratos, PASS no-op.
  pull_request:
  # Reutilizable desde otros workflows (mismo repo) si se quiere componer.
  workflow_call:

permissions:
  contents: read
  pull-requests: write   # comentar el veredicto vía el Reporter (usa el GITHUB_TOKEN del runner)

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para `git diff` contra la rama base

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install optional tree-sitter grammars (dogfooding multi-lenguaje completo)
        run: pip install tree_sitter tree_sitter_typescript tree_sitter_rust tree_sitter_go tree_sitter_java tree_sitter_c_sharp tree_sitter_php tree_sitter_ruby tree_sitter_kotlin tree_sitter_c tree_sitter_swift tree_sitter_cpp

      - name: ccdd-gate (tc_lint + task_gate) sobre los contratos del PR
        env:
          GH_TOKEN: ${{ github.token }}   # gh CLI usa este token; sin secretos en el repo
        run: |
          python integrations/github/ci_gate.py \
            --changed-against "origin/${{ github.base_ref }}" \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.pull_request.number }}" \
            --post

      # Dogfooding: el propio repo se somete al complexity gate. Falla si una función de
      # PRODUCCIÓN supera el umbral CRÍTICA firmado. Multi-lenguaje: cubre todo lenguaje con
      # backend registrado (Python + los 13 lenguajes tree-sitter instalados arriba).
      # Los avisos ALTA se reportan pero no bloquean (espejo de la semántica del gate).
      - name: complexity-gate sobre el propio código (dogfooding)
        run: python runners/repo_gate.py
